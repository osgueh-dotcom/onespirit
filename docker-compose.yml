version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: onespirit_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-onespirit_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-onespirit_pass}
      POSTGRES_DB: ${DB_NAME:-onespirit_db}
    ports:
      - "${DB_PORT_HOST:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-onespirit_user} -d ${DB_NAME:-onespirit_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onespirit_backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-onespirit_user}
      - DB_PASSWORD=${DB_PASSWORD:-onespirit_pass}
      - DB_NAME=${DB_NAME:-onespirit_db}
      - JWT_SECRET=${JWT_SECRET:-supersecret_change_me_in_production_1234567890!}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - ENV=${ENV:-development}
      - DEBUG=${DEBUG:-false}
      - AUTO_CREATE_TABLES=${AUTO_CREATE_TABLES:-true}
      - SEED_DEMO_USER=${SEED_DEMO_USER:-true}
      - SEED_PLACEHOLDER_USERS=${SEED_PLACEHOLDER_USERS:-true}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@onespirit.asia}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-OneSpirit2026!}
      - DEMO_EMAIL=${DEMO_EMAIL:-demo@onespirit.asia}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-OneSpiritDemo2026!}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onespirit_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_PROXY_TARGET=${VITE_PROXY_TARGET:-http://backend:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
